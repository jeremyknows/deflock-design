name: verify
on:
  push:
    branches: [main]
  pull_request:
jobs:
  tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Token drift guard
        run: node scripts/verify-tokens.mjs
