<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:14px;background:var(--df-color-paper);display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.t{border:var(--df-border-default);min-height:150px;padding:10px;display:grid;align-content:end}
.k{font-family:var(--df-font-meta);font-weight:700;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;margin:0}
.u{font-family:var(--df-font-meta);font-size:8.5px;margin:3px 0 0;opacity:.75;text-transform:uppercase}</style></head>
<body>
<div class="t" style="background:var(--df-halftone-image),var(--df-color-paper);background-size:var(--df-halftone-size),auto"><p class="k">Ink halftone</p><p class="u">radial dot 1.1px @ 9px · rgba(20,16,10,.14)</p></div>
<div class="t" style="background:radial-gradient(circle, var(--df-halftone-red) 1.1px, transparent 1.2px),var(--df-color-paper);background-size:9px 9px,auto"><p class="k">Red variant</p><p class="u">rgba(217,43,28,.16) · rationed like all red</p></div>
<div class="t" style="background:var(--df-color-paper)"><div style="position:absolute"></div><div style="border:0;margin:-10px -10px 6px;height:96px;background-image:url(&quot;data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='120' height='120' filter='url(%23n)' opacity='0.45'/%3E%3C/svg%3E&quot;);background-size:120px 120px;opacity:.35;mix-blend-mode:multiply"></div><p class="k">Grain overlay</p><p class="u">feTurbulence .9 ×2 octaves · opacity .05–.08 · multiply</p></div>
</body></html>
