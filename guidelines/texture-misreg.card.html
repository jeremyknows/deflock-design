<!-- @dsCard group="Texture" viewport="700x210" name="Misregistration + stamp + reg marks" subtitle="The plates slipped: .045em red offset (display only) · stamp rings · 1.5px crosshairs" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:14px;background:var(--df-color-paper);display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:10px;align-items:stretch}
.b{border:var(--df-border-default);padding:12px;display:grid;place-content:center;justify-items:center;gap:8px;position:relative}
.u{font-family:var(--df-font-meta);font-weight:700;font-size:8.5px;letter-spacing:.1em;margin:0;opacity:.75;text-transform:uppercase;text-align:center}
.cross{position:absolute;width:14px;height:14px}
.cross::before,.cross::after{content:"";position:absolute;background:var(--df-color-ink)}
.cross::before{left:50%;top:0;width:1.5px;height:100%;margin-left:-0.75px}
.cross::after{top:50%;left:0;height:1.5px;width:100%;margin-top:-0.75px}</style></head>
<body>
<div class="b"><p style="font-family:var(--df-font-slam);font-size:38px;text-transform:uppercase;margin:0;text-shadow:var(--df-misreg-shadow)">Flagged</p><p class="u">text-shadow .045em .03em 0 red · down-right · peak .075em in motion only</p></div>
<div class="b"><span style="display:inline-block;padding:8px 12px;border:3px solid var(--df-color-red);box-shadow:var(--df-stamp-inset);transform:rotate(-4deg);font-family:var(--df-font-meta);font-weight:700;font-size:13px;letter-spacing:.12em;color:var(--df-color-red);text-transform:uppercase">SPOTTED</span><p class="u">3px red + paper/red inset rings · −4°..4°</p></div>
<div class="b"><span class="cross" style="left:6px;top:6px"></span><span class="cross" style="right:6px;top:6px"></span><span class="cross" style="left:6px;bottom:24px"></span><span class="cross" style="right:6px;bottom:24px"></span><p style="font-family:var(--df-font-meta);font-weight:700;font-size:11px;letter-spacing:.14em;margin:0;text-transform:uppercase">Reg marks</p><p class="u">1.5px ink crosshairs · 4 corners · chips 14px</p></div>
</body></html>
