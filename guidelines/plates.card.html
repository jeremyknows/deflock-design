<!-- @dsCard group="Colors" viewport="700x170" name="The three plates" subtitle="Paper stock · ink press · rationed red — plus the one sanctioned exception" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:14px;background:var(--df-color-paper);display:grid;grid-template-columns:1.2fr 1fr .9fr .7fr;gap:10px}
.sw{border:var(--df-border-default);display:grid;align-content:end;gap:2px;padding:10px;min-height:130px}
.n{font-family:var(--df-font-label);font-weight:700;font-size:15px;text-transform:uppercase;margin:0}
.h{font-family:var(--df-font-meta);font-weight:700;font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin:0}
.r{font-family:var(--df-font-meta);font-size:9px;letter-spacing:.06em;text-transform:uppercase;margin:0;opacity:.75}</style></head>
<body>
<div class="sw" style="background:var(--df-halftone-image),var(--df-color-paper);background-size:var(--df-halftone-size),auto"><p class="n">Paper</p><p class="h">#F2EDE3</p><p class="r">stock · ~70% of any frame</p></div>
<div class="sw" style="background:var(--df-color-ink);color:var(--df-color-paper)"><p class="n">Ink</p><p class="h">#14100A</p><p class="r">all type + linework · never pure #000</p></div>
<div class="sw" style="background:var(--df-color-red);color:var(--df-color-paper)"><p class="n">Red</p><p class="h">#D92B1C</p><p class="r">the only accent · 1–2 hits · &lt;15%</p></div>
<div class="sw" style="background:var(--df-color-gadsden)"><p class="n">Gadsden</p><p class="h">#E8B63A</p><p class="r">DONT TREAD lineage only</p></div>
</body></html>
