<!-- @dsCard group="Motion" viewport="700x200" name="Motion grammar" subtitle="Riso has no tweens: PRESS, REWARD, PLATE, CUT · 24fps · reduced-motion collapses to CUT" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:14px;background:var(--df-color-paper);display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.m{border:var(--df-border-default);padding:10px;min-height:150px;display:grid;align-content:space-between;justify-items:start}
.k{font-family:var(--df-font-label);font-weight:700;font-size:15px;text-transform:uppercase;margin:0}
.u{font-family:var(--df-font-meta);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;margin:0;opacity:.8;line-height:1.5}
.chip{width:26px;height:26px;background:var(--df-color-red)}
@media (prefers-reduced-motion: no-preference){
.a1{animation:press 1.6s cubic-bezier(0.6,0,0.9,1) infinite}
.a2{animation:reward 1.6s cubic-bezier(0.34,1.56,0.64,1) infinite}
.a3{animation:plate 2.4s linear infinite}
.a4{animation:cut 1.6s steps(2,jump-none) infinite}
}
@keyframes press{0%,20%{transform:translateY(-26px)}45%,100%{transform:none}}
@keyframes reward{0%,20%{transform:scale(.6)}55%,100%{transform:scale(1)}}
@keyframes plate{0%{transform:translateX(0)}100%{transform:translateX(40px)}}
@keyframes cut{0%,49%{transform:none}50%,100%{transform:translateX(34px)}}</style></head>
<body>
<div class="m"><span class="chip a1"></span><div><p class="k">Press</p><p class="u">cubic(0.6,0,0.9,1) · 150–300ms · arrivals, slams</p></div></div>
<div class="m"><span class="chip a2" style="background:var(--df-color-ink)"></span><div><p class="k">Reward</p><p class="u">cubic(0.34,1.56,0.64,1) · 400–700ms · the ONLY overshoot</p></div></div>
<div class="m"><span class="chip a3"></span><div><p class="k">Plate</p><p class="u">linear · crawls + plate shifts</p></div></div>
<div class="m"><span class="chip a4" style="background:var(--df-color-ink)"></span><div><p class="k">Cut</p><p class="u">no ease · the default · holds: slam 1.2s, label 2s, endcard 1.5s</p></div></div>
</body></html>
