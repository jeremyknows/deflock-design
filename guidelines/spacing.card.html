<!-- @dsCard group="Spacing" viewport="700x180" name="8px unit + control heights" subtitle="Everything is calc(unit × n) · tap-target floor 44px" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:14px;background:var(--df-color-paper)}
.scale{display:flex;align-items:flex-end;gap:8px;margin-bottom:14px}
.u{background:var(--df-color-ink)}
.lbl{font-family:var(--df-font-meta);font-weight:700;font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;text-align:center;margin:3px 0 0}
.hrow{display:flex;gap:10px;align-items:flex-end}
.h{display:grid;place-items:center;border:var(--df-border-default);font-family:var(--df-font-meta);font-weight:700;font-size:9.5px;letter-spacing:.1em;padding:0 12px}</style></head>
<body>
<div class="scale">
<div><div class="u" style="width:8px;height:8px"></div><p class="lbl">1u</p></div>
<div><div class="u" style="width:16px;height:16px"></div><p class="lbl">2u</p></div>
<div><div class="u" style="width:24px;height:24px"></div><p class="lbl">3u pad</p></div>
<div><div class="u" style="width:32px;height:32px"></div><p class="lbl">4u</p></div>
<div><div class="u" style="width:48px;height:48px"></div><p class="lbl">6u</p></div>
<div><div class="u" style="width:72px;height:72px"></div><p class="lbl">9u avatar</p></div>
</div>
<div class="hrow">
<span class="h" style="height:40px">SM 40</span>
<span class="h" style="height:44px;border-width:3px">MD 44 · TAP FLOOR</span>
<span class="h" style="height:48px">LG 48</span>
<span class="h" style="height:56px">XL 56</span>
</div>
</body></html>
