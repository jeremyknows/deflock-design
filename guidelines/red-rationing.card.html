<!-- @dsCard group="Colors" viewport="700x190" name="Red is rationed" subtitle="1–2 hits, <15% of frame · never red type on ink · LOUD MODE is the one sanctioned flood" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:14px;background:var(--df-color-paper);display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.f{border:var(--df-border-default);position:relative;min-height:150px;padding:12px;display:grid;align-content:center;justify-items:center;gap:6px;overflow:hidden}
.slam{font-family:var(--df-font-slam);font-size:22px;line-height:.95;text-transform:uppercase;text-align:center;margin:0}
.v{font-family:var(--df-font-meta);font-weight:700;font-size:9px;letter-spacing:.14em;text-transform:uppercase;position:absolute;left:8px;top:8px;padding:2px 5px}
.ok{background:var(--df-color-ink);color:var(--df-color-paper)}.no{background:var(--df-color-red);color:var(--df-color-paper)}</style></head>
<body>
<div class="f"><span class="v ok">RIGHT</span><p class="slam">They map<br>your <span style="color:var(--df-color-red)">plates.</span></p><p class="slam" style="font-size:10px;font-family:var(--df-font-meta);font-weight:700;letter-spacing:.12em">one red hit · rest is ink</p></div>
<div class="f" style="background:var(--df-color-ink);color:var(--df-color-paper)"><span class="v no">NEVER</span><p class="slam" style="color:var(--df-color-red)">Red type<br>on ink</p><p class="slam" style="font-size:10px;font-family:var(--df-font-meta);font-weight:700;letter-spacing:.12em;color:var(--df-color-paper)">1.8:1 · banned pairing</p></div>
<div class="f" style="background:var(--df-color-red);color:var(--df-color-paper)"><span class="v ok" style="background:var(--df-color-paper);color:var(--df-color-red)">LOUD MODE</span><p class="slam">The flood is<br>sanctioned once</p><p class="slam" style="font-size:10px;font-family:var(--df-font-meta);font-weight:700;letter-spacing:.12em">X Templates §10 only · itself rationed</p></div>
</body></html>
